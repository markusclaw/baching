<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baching</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 40px;
      cursor: pointer;
    }
    
    h1 {
      font-size: 48px;
      color: #333;
      letter-spacing: 2px;
    }
    
    #cat-container {
      position: relative;
      width: 400px;
      height: 400px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    img {
      max-width: 400px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: opacity 0.1s ease-out;
    }
  </style>
</head>
<body>
  <h1>Baching</h1>
  <div id="cat-container">
    <img id="cat" src="01-sit_center_master.png" alt="Baching">
  </div>

  <script>
    const cat = document.getElementById('cat');
    
    // Sprite library
    const sprites = {
      // Directions (11 poses)
      'center': '01-sit_center_master.png',
      'left-slight': '02-sit_look_left.png',
      'left-far': '03-sit_far_left.png',
      'right-slight': '04-sit_look_right.png',
      'right-far': '05-sit_far_right.png',
      'up': '06-sit_look_up.png',
      'down': '07-sit_look_down.png',
      'up-left': '08-sit_up_left.png',
      'up-right': '09-sit_up_right.png',
      'down-left': '10-sit_down_left.png',
      'down-right': '11-sit_down_right.png',
      
      // Blinks
      'blink-center': '12-sit_blink_center.png',
      'blink-left': '13-sit_blink_left.png',
      'blink-right': '14-sit_blink_right.png',
      
      // Tail wags
      'tail-wag-a': '15-sit_tail_wag_a.png',
      'tail-wag-b': '16-sit_tail_wag_b.png',
      
      // Extras
      'far-up': '17-sit_far_up.png',
      'lay-tail-wag': '18-lay_tail_wag_c.png',
      'lay-blink': '19-lay_tail_blink.png'
    };
    
    let currentPose = 'center';
    let animationState = 'idle'; // idle, blinking, tail-wagging
    
    // Random blink trigger (every 3-8 seconds)
    function scheduleRandomBlink() {
      const delay = 3000 + Math.random() * 5000;
      setTimeout(() => {
        if (animationState === 'idle') {
          triggerBlink();
        }
        scheduleRandomBlink();
      }, delay);
    }
    
    // Random tail wag (every 2-6 seconds)
    function scheduleRandomTailWag() {
      const delay = 2000 + Math.random() * 4000;
      setTimeout(() => {
        if (animationState === 'idle') {
          triggerTailWag();
        }
        scheduleRandomTailWag();
      }, delay);
    }
    
    function triggerBlink() {
      animationState = 'blinking';
      const blinkSequence = [currentPose, 'blink-center', currentPose];
      
      // Map blinks based on direction
      if (currentPose === 'left-slight' || currentPose === 'left-far') {
        blinkSequence[1] = 'blink-left';
      } else if (currentPose === 'right-slight' || currentPose === 'right-far') {
        blinkSequence[1] = 'blink-right';
      }
      
      let frameIndex = 0;
      
      const blinkAnim = setInterval(() => {
        cat.src = sprites[blinkSequence[frameIndex]];
        frameIndex++;
        if (frameIndex >= blinkSequence.length) {
          clearInterval(blinkAnim);
          animationState = 'idle';
        }
      }, 80);
    }
    
    function triggerTailWag() {
      animationState = 'tail-wagging';
      const wagSequence = ['tail-wag-a', 'tail-wag-b', 'tail-wag-a'];
      let frameIndex = 0;
      let loopCount = 0;
      
      const wagAnim = setInterval(() => {
        cat.src = sprites[wagSequence[frameIndex]];
        frameIndex++;
        
        if (frameIndex >= wagSequence.length) {
          frameIndex = 0;
          loopCount++;
          
          if (loopCount >= 2) {
            clearInterval(wagAnim);
            cat.src = sprites[currentPose];
            animationState = 'idle';
          }
        }
      }, 150);
    }
    
    function setPose(pose) {
      if (currentPose !== pose && animationState === 'idle') {
        currentPose = pose;
        cat.src = sprites[pose];
      }
    }
    
    document.addEventListener('mousemove', (e) => {
      if (animationState !== 'idle') return; // Don't interrupt animations
      
      const width = window.innerWidth;
      const height = window.innerHeight;
      const x = e.clientX;
      const y = e.clientY;
      
      const thirdWidth = width / 3;
      const thirdHeight = height / 3;
      
      let horizontalZone = 'center';
      let verticalZone = 'middle';
      
      if (x < thirdWidth) horizontalZone = 'left';
      else if (x > 2 * thirdWidth) horizontalZone = 'right';
      
      if (y < thirdHeight) verticalZone = 'up';
      else if (y > 2 * thirdHeight) verticalZone = 'down';
      
      // Map zones to poses with gradation
      // FLIPPED: pointer direction → cat looks toward pointer
      let pose = 'center';
      
      if (verticalZone === 'up') {
        if (horizontalZone === 'right') {
          pose = 'up-right';
        } else if (horizontalZone === 'left') {
          pose = 'up-left';
        } else {
          pose = 'far-up';
        }
      } else if (verticalZone === 'middle') {
        if (horizontalZone === 'right') {
          pose = 'left-far'; // FLIPPED: pointer right → look left
        } else if (horizontalZone === 'left') {
          pose = 'right-far'; // FLIPPED: pointer left → look right
        } else {
          pose = 'center';
        }
      } else if (verticalZone === 'down') {
        if (horizontalZone === 'right') {
          pose = 'down-left'; // FLIPPED
        } else if (horizontalZone === 'left') {
          pose = 'down-right'; // FLIPPED
        } else {
          pose = 'down';
        }
      }
      
      setPose(pose);
    });
    
    // Start animation timers
    scheduleRandomBlink();
    scheduleRandomTailWag();
  </script>
</body>
</html>
