<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baching</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 40px;
      cursor: pointer;
    }
    
    h1 {
      font-size: 48px;
      color: #333;
      letter-spacing: 2px;
    }
    
    #cat-container {
      perspective: 1000px;
    }
    
    img {
      max-width: 400px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: transform 0.15s ease-out, filter 0.1s ease-out;
    }
    
    img.flipped {
      transform: scaleX(-1);
    }
  </style>
</head>
<body>
  <h1>Baching</h1>
  <div id="cat-container">
    <img id="cat" src="baching-neutral.png" alt="Baching">
  </div>

  <script>
    const cat = document.getElementById('cat');
    const assets = {
      'right': 'baching.png',
      'neutral': 'baching-neutral.png',
      'right-up': 'baching-right-up.png'
    };
    
    let currentAsset = 'neutral';
    let isFlipped = false;
    
    function setCatState(asset, flipped = false) {
      if (currentAsset !== asset || isFlipped !== flipped) {
        cat.src = assets[asset];
        currentAsset = asset;
        isFlipped = flipped;
        
        if (flipped) {
          cat.classList.add('flipped');
        } else {
          cat.classList.remove('flipped');
        }
      }
    }
    
    document.addEventListener('mousemove', (e) => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      const x = e.clientX;
      const y = e.clientY;
      
      // 3x3 zones
      const thirdWidth = width / 3;
      const thirdHeight = height / 3;
      
      let horizontalZone = 'center'; // left, center, right
      let verticalZone = 'middle';    // up, middle, down
      
      if (x < thirdWidth) horizontalZone = 'left';
      else if (x > 2 * thirdWidth) horizontalZone = 'right';
      
      if (y < thirdHeight) verticalZone = 'up';
      else if (y > 2 * thirdHeight) verticalZone = 'down';
      
      // Map zones to assets
      if (verticalZone === 'up') {
        if (horizontalZone === 'right') {
          setCatState('right-up', false);
        } else if (horizontalZone === 'left') {
          setCatState('right-up', true); // flipped
        } else {
          setCatState('right-up', false); // up, use right-up
        }
      } else if (verticalZone === 'middle') {
        if (horizontalZone === 'right') {
          setCatState('right', false);
        } else if (horizontalZone === 'left') {
          setCatState('right', true); // flipped
        } else {
          setCatState('neutral', false);
        }
      } else if (verticalZone === 'down') {
        if (horizontalZone === 'right') {
          setCatState('right', false); // down-right, use right
        } else if (horizontalZone === 'left') {
          setCatState('right', true); // down-left, flipped
        } else {
          setCatState('neutral', false); // down, use neutral
        }
      }
    });
  </script>
</body>
</html>
