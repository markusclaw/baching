<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baching</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 40px;
      cursor: pointer;
    }
    
    h1 {
      font-size: 48px;
      color: #333;
      letter-spacing: 2px;
    }
    
    #cat-container {
      perspective: 1000px;
    }
    
    img {
      max-width: 400px;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: transform 0.15s ease-out, opacity 0.1s ease-out;
    }
    
    img.flipped {
      transform: scaleX(-1);
    }
  </style>
</head>
<body>
  <h1>Baching</h1>
  <div id="cat-container">
    <img id="cat" src="baching-neutral.png" alt="Baching">
  </div>

  <script>
    const cat = document.getElementById('cat');
    
    document.addEventListener('mousemove', (e) => {
      const width = window.innerWidth;
      const pointerX = e.clientX;
      
      // Three zones: left (0-33%), center (33-66%), right (66-100%)
      const thirdWidth = width / 3;
      
      if (pointerX < thirdWidth) {
        // Left zone: show flipped right-looking cat
        cat.src = 'baching.png';
        cat.classList.add('flipped');
      } else if (pointerX < 2 * thirdWidth) {
        // Center zone: show neutral looking straight
        cat.src = 'baching-neutral.png';
        cat.classList.remove('flipped');
      } else {
        // Right zone: show right-looking cat normally
        cat.src = 'baching.png';
        cat.classList.remove('flipped');
      }
    });
  </script>
</body>
</html>
